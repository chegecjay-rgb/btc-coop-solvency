[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
  "solmate/=lib/solmate/src/"
]

[rpc_endpoints]
aurora_testnet = "${AURORA_TESTNET_RPC}"
aurora_mainnet = "${AURORA_MAINNET_RPC}"

[fuzz]
runs = 512

[invariant]
runs = 128
depth = 64
fail_on_revert = false
